<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Coming Soon</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100vw;
      height: 100vh;  /* Fallback */
      height: 100dvh; /* Moderní jednotka pro mobily (řeší černé okraje) */
      overflow: hidden;
    }

    body {
      /* Výchozí obrázek pro desktop */
      background-image: url('desktop.png');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }

    /* Přepnutí na mobilní obrázek na menších obrazovkách */
    @media (max-width: 768px) {
      body {
        background-image: url('mobile.png');
      }
    }
  </style>
</head>
<body>
  <!-- Žádný obsah, vše je řešeno přes pozadí v CSS -->
</body>
</html>
