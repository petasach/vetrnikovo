<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Coming Soon</title>
  <style>
    /* Totální reset */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    /* Zajistíme, že základní kontejnery nekladou odpor */
    html, body {
      width: 100%;
      height: 100%;
      background-color: #0c0c0e; /* Nebo barva tvého obrázku */
      overflow: hidden;
    }

    /* Vytvoříme vrstvu, která ignoruje Safe Area */
    .fullscreen-bg {
      position: fixed;
      /* Místo inset: 0 použijeme záporné hodnoty, pokud by telefon stále stávkoval, 
         ale s viewport-fit=cover by měly stačit nuly */
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      
      /* Použití vh/vw jednotek, které ignorují UI prohlížeče */
      width: 100vw;
      height: 100dvh;
      
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      z-index: -1;
    }

    /* Obrázky na pozadí */
    .fullscreen-bg {
      background-image: url('desktop.png');
    }

    @media (max-width: 768px) {
      .fullscreen-bg {
        background-image: url('mobile.png');
      }
    }
  </style>
</head>
<body>
  <div class="fullscreen-bg"></div>
</body>
</html>
