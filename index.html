<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Větrníkovo</title>
  <style>
    /* Reset všeho */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    /* Klíč k úspěchu: Body musí být fixní a zabírat absolutně vše */
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #fbebca; /* Barva z obrázku - pojistka proti černým pruhům */
    }

    .bg-image {
      position: fixed;
      /* Tyto 4 nuly spolu s viewport-fit=cover roztáhnou img přes notch i lištu */
      top: 0;
      left: 0;
      width: 100vw;
      height: 100dvh; 
      
      /* Object-fit zajistí, že se obrázek nepomačká, ale ořízne jako pozadí */
      object-fit: cover;
      object-position: center;
      
      z-index: 1;
    }

    .img-desktop { display: block; }
    .img-mobile  { display: none; }

    @media (max-width: 768px) {
      .img-desktop { display: none; }
      .img-mobile  { display: block; }
    }
  </style>
</head>
<body>

  <img src="desktop.png" class="bg-image img-desktop" alt="Background">
  <img src="mobile.png"  class="bg-image img-mobile"  alt="Background">

</body>
</html>
