<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Coming Soon</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #0c0c0e;
    }

    img {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .img-desktop { display: block; }
    .img-mobile  { display: none;  }

    @media (max-width: 768px) {
      .img-desktop { display: none;  }
      .img-mobile  { display: block; }
    }
  </style>
</head>
<body>
  <img class="img-desktop" src="desktop.png" alt="Coming Soon" />
  <img class="img-mobile"  src="mobile.png"  alt="Coming Soon" />
</body>
</html>
